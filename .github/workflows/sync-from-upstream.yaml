name: Sync from fork

on:
  schedule:
    - cron: '0 8 */7 * *' # At 08:00 on every 7th day-of-month

  # Allows manual triggering from the Actions tab of this repository
  workflow_dispatch:

  # Allows triggering from another repository
  workflow_call:

env:
  # Repo-specific settings – update these when using as a template
  CHART_DIR: helm/kyverno
  UPDATE_BRANCH: 'main#update-chart'
  POLICY_REPORTER_FORK_REPO: https://github.com/giantswarm/policy-reporter-upstream
  KYVERNO_FORK_REPO: https://github.com/giantswarm/kyverno-upstream

jobs:
  sync-app-kyverno-with-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update vendir and push to update branch
        run: |
          POLICY_REPORTER_LAST_TAG=$(git ls-remote --tags --sort='v:refname' --refs ${{ env.POLICY_REPORTER_FORK_REPO }} \
           | tail -1 | cut -d '/' -f3)
          echo "Policy Reporter last tag found is $POLICY_REPORTER_LAST_TAG"

          KYVERNO_LAST_TAG=$(git ls-remote --tags --sort='v:refname' --refs ${{ env.KYVERNO_FORK_REPO }} \
           | tail -1 | cut -d '/' -f3)
          echo "Kyverno last tag found is $KYVERNO_LAST_TAG"

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git checkout -b ${{ env.UPDATE_BRANCH }}

          sed -i "/policy-reporter/{n;s/ref: .*/ref: $POLICY_REPORTER_LAST_TAG/}" vendir.yml
          sed -i "/kyverno/{n;s/ref: .*/ref: $KYVERNO_LAST_TAG/}" vendir.yml
          git add vendir.yml
          git commit -m "Update app version from fork repo"
          git push origin ${{ env.UPDATE_BRANCH }}

  call-update-chart:
    uses: ./.github/workflows/zz_generated.update_chart.yaml
    needs: sync-app-kyverno-with-fork
    secrets: inherit
    with:
      branch: 'main#update-chart'

  sync-and-update:
    runs-on: ubuntu-latest
    needs: call-update-chart
    outputs:
      entries: ${{ steps.changelog.outputs.entries }}
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HERALD_APP_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.UPDATE_BRANCH }}
          token: ${{ steps.generate_token.outputs.token }}
      - name: Fetch main branch for version comparison
        run: git fetch origin main
      - name: Run values-sync
        uses: docker://gsoci.azurecr.io/giantswarm/shield-values-sync:0.0.2
        with:
          args: --chart-dir /github/workspace/${{ env.CHART_DIR }}
      - name: Run schema-gen
        uses: docker://gsoci.azurecr.io/giantswarm/shield-schema-gen:0.0.2
        with:
          args: --chart-dir /github/workspace/${{ env.CHART_DIR }}
      - name: Detect dependency version changes
        id: detect
        run: |
          set -euo pipefail

          CHART_YAML="${{ env.CHART_DIR }}/Chart.yaml"
          deps=$(awk '
            /^dependencies:/ { in_deps=1; next }
            in_deps && /^[^[:space:]]/ { in_deps=0 }
            in_deps && /name:/ { print $NF }
          ' "${CHART_YAML}")

          entries_file=$(mktemp)
          while IFS= read -r dep; do
            subchart="${{ env.CHART_DIR }}/charts/${dep}/Chart.yaml"
            if [[ ! -f "${subchart}" ]]; then
              echo "warning: ${subchart} not found, skipping ${dep}" >&2
              continue
            fi

            new_version=$(grep -E "^appVersion:" "${subchart}" | awk '{print $NF}')
            old_version=$(git show origin/main:"${subchart}" 2>/dev/null \
              | grep -E "^appVersion:" | awk '{print $NF}' || true)

            if [[ "${old_version}" == "${new_version}" ]]; then
              echo "No version change for ${dep} (${new_version}), skipping"
              continue
            fi

            [[ "${new_version}" != v* ]] && new_version="v${new_version}"
            echo "- Updated \`${dep}\` to upstream version \`${new_version}\`." >> "${entries_file}"
          done <<< "${deps}"

          echo "entries_file=${entries_file}" >> "$GITHUB_OUTPUT"
      - name: Run changelogger
        id: changelogger
        run: |
          set -euo pipefail

          entries_file="${{ steps.detect.outputs.entries_file }}"
          args=()
          entries=""
          while IFS= read -r entry; do
            args+=(--add-changed "${entry}")
            entries="${entries}${entry}"$'\n'
          done < "${entries_file}"

          if [[ ${#args[@]} -gt 0 ]]; then
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              gsoci.azurecr.io/giantswarm/shield-changelogger:0.0.2 \
              --changelog-path /workspace/CHANGELOG.md \
              "${args[@]}"
          fi

          {
            echo "entries<<EOF"
            printf '%s' "${entries%$'\n'}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Commit and push
        run: |
          git config --local user.email "149080493+heraldbot[bot]@users.noreply.github.com"
          git config --local user.name "HeraldBot[bot]"
          git add ${{ env.CHART_DIR }}/values.yaml ${{ env.CHART_DIR }}/values.schema.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "Sync values, schema and changelog from upstream"
          git push origin ${{ env.UPDATE_BRANCH }}

  update-pr-description:
    runs-on: ubuntu-latest
    needs: sync-and-update
    if: needs.sync-and-update.outputs.entries != ''
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HERALD_APP_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}
      - name: Update PR description
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          gh pr edit '${{ env.UPDATE_BRANCH }}' \
            --repo ${{ github.repository }} \
            --body "$(printf '### Changes\n\n%s' "${{ needs.sync-and-update.outputs.entries }}")"
